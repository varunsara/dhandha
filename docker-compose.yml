version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dhandha
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/development/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dhandha-network

  # Redis (for caching and sessions)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dhandha-network

  # Prisma Studio (Database UI)
  prisma-studio:
    image: node:18-alpine
    working_dir: /app
    command: npx prisma studio --port 5555 --hostname 0.0.0.0
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/dhandha
    depends_on:
      - postgres
    networks:
      - dhandha-network

  # MailHog (Email testing)
  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - dhandha-network

volumes:
  postgres_data:
  redis_data:

networks:
  dhandha-network:
    driver: bridge